<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Seas Flyers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.banner{
width:100%;
height:auto;
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
max-width:1300px;
margin:40px auto;
padding:0 20px;
}

.grid a{
display:block;
}

.grid img{
width:100%;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
transition:transform .2s;
}

.grid img:hover{
transform:scale(1.05);
}

@media (max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>

<body>

<img class="banner" src="coming-soon.png">

<div class="grid">

<a href="thumb1.jpg" target="_blank"><img src="thumb1.jpg"></a>
<a href="thumb2.jpg" target="_blank"><img src="thumb2.jpg"></a>

<a href="thumb7.jpg" target="_blank"><img src="thumb7.jpg"></a>

</div>

</body>
</html>
