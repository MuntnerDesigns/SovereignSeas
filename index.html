<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#ffffff;
}

/* Coming soon banner */

.banner{
width:100%;
max-height:500px;
object-fit:cover;
display:block;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:40px;
max-width:1200px;
margin:auto;
}

/* grid items */

.grid a{
display:block;
}

.grid img{
width:100%;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:transform .2s;
}

.grid img:hover{
transform:scale(1.05);
}

@media (max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<img class="banner" src="coming-soon.png">
