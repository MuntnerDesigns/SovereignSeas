<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Seas</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .page-wrap {
      width: 100%;
    }

    .banner-wrapper {
      width: 100%;
      background: #ffffff;
    }

    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    .grid-section {
      padding: 40px 24px 60px;
    }

    .grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-label {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      background: #ffffff;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }

      .grid-section {
        padding: 24px 16px 40px;
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <div class="banner-wrapper">
      <img class="banner" src="coming-soon.png" alt="Coming Soon">
    </div>

    <section class="grid-section">
      <div class="grid">

        <a class="card" href="thumb1.jpg" target="_blank" rel="noopener noreferrer">
          <img src="thumb1.jpg" alt="PDF 1">
          <div class="card-label">PDF 1</div>
        </a>

        <a class="card" href="pdfs/doc2.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb2.jpg" alt="PDF 2">
          <div class="card-label">PDF 2</div>
        </a>

        <a class="card" href="pdfs/doc3.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb3.jpg" alt="PDF 3">
          <div class="card-label">PDF 3</div>
        </a>

        <a class="card" href="pdfs/doc4.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb4.jpg" alt="PDF 4">
          <div class="card-label">PDF 4</div>
        </a>

        <a class="card" href="pdfs/doc5.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb5.jpg" alt="PDF 5">
          <div class="card-label">PDF 5</div>
        </a>

        <a class="card" href="pdfs/doc6.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb6.jpg" alt="PDF 6">
          <div class="card-label">PDF 6</div>
        </a>

        <a class="card" href="pdfs/doc7.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb7.jpg" alt="PDF 7">
          <div class="card-label">PDF 7</div>
        </a>

        <a class="card" href="pdfs/doc8.pdf" target="_blank" rel="noopener noreferrer">
          <img src="images/thumb8.jpg" alt="PDF 8">
          <div class="card-label">PDF 8</div>
        </a>

      </div>
    </section>

  </div>
</body>
</html>
